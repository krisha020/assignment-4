<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Skills dashboard</title>
	<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
<div class="wrapper">
	<header>
		<h1>My skills dashboard</h1>
	</header>
	
	<main class="grid">
		<div class="card" data-skill="HTML">
			<h2>HTML</h2>
			<div class="circle" data-value="90">30%</div>
		</div>
		<div class="card" data-skill="CSS">
			<h2>CSS</h2>
			<div class="circle" data-value="80">50%</div>
		</div>
		<div class="card" data-skill="JavaScript">
			<h2>JavaScript</h2>
			<div class="circle" data-value="70">20%</div>
		</div>
	</main>
</div>
<script src="js/dashboard.js"></script>
</body>
</html>
